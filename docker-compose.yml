services:
  postgres:
    image: postgres:16-alpine
    container_name: aproxima_postgres
    restart: unless-stopped
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: aproxima
      POSTGRES_PASSWORD: aproxima_dev
      POSTGRES_DB: aproxima
    volumes:
      - aproxima_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aproxima -d aproxima"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: aproxima_redis
    restart: unless-stopped
    ports:
      - "6381:6379"
    volumes:
      - aproxima_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  evolution-api:
    image: atendai/evolution-api:latest
    container_name: aproxima_evolution
    restart: unless-stopped
    ports:
      - "8181:8080"
    environment:
      SERVER_URL: http://localhost:8080
      AUTHENTICATION_API_KEY: evolution_dev_key
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://aproxima:aproxima_dev@postgres:5432/evolution
      DATABASE_URL: postgresql://aproxima:aproxima_dev@postgres:5432/evolution
      DATABASE_CONNECTION_CLIENT_NAME: evolution
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://redis:6379
      CACHE_REDIS_PREFIX_KEY: evo
      CACHE_REDIS_SAVE_INSTANCES: "true"
      CACHE_REDIS_TTL: "604800"
      CACHE_LOCAL_ENABLED: "false"
      WEBHOOK_GLOBAL_ENABLED: "true"
      WEBHOOK_GLOBAL_URL: http://host.docker.internal:3000/api/webhook/evolution
      WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS: "false"
      WEBHOOK_EVENTS_MESSAGES_UPSERT: "true"
      WEBHOOK_EVENTS_CONNECTION_UPDATE: "false"
      WEBHOOK_EVENTS_QRCODE_UPDATED: "false"
      LOG_LEVEL: DEBUG
      LOG_COLOR: "false"
      LOG_BAILEYS: "error"
      DEL_INSTANCE: "false"
      LANGUAGE: pt-BR
    volumes:
      - evolution_instances:/evolution/instances
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  aproxima_pg_data:
  aproxima_redis_data:
  evolution_instances:
