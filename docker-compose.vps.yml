# VPS-only: Evolution API + sua infra + Worker BullMQ
# Next.js roda no Vercel; Postgres/Redis do app estão em Neon + Upstash.
#
# Pré-requisitos na VPS:
#   1. Clonar o repo: git clone ... && cd aproximaAI
#   2. Criar .env.worker com as vars do worker (ver .env.example)
#   3. Criar .env.vps com as vars do Evolution (ver abaixo)
#   4. docker compose -f docker-compose.vps.yml up -d
#
# Vars necessárias em .env.vps:
#   POSTGRES_PASSWORD=senha_forte_evolution
#   EVOLUTION_API_KEY=chave_forte_evolution
#   EVOLUTION_SERVER_URL=https://evolution.seudominio.com
#   APP_URL=https://seuapp.vercel.app

services:

  # ─── Evolution API ───────────────────────────────────────────────────────────
  evolution-api:
    # TODO: pin para versão estável — substitua 'latest' pelo tag exato.
    # Comando para encontrar versão em execução: docker inspect --format '{{.Config.Image}}' aproxima_evolution
    image: atendai/evolution-api:latest
    container_name: aproxima_evolution
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"  # só localhost — Nginx expõe via HTTPS
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
    env_file: .env.vps
    environment:
      SERVER_URL: ${EVOLUTION_SERVER_URL}
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY}
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://evolution:${POSTGRES_PASSWORD}@postgres:5432/evolution
      DATABASE_URL: postgresql://evolution:${POSTGRES_PASSWORD}@postgres:5432/evolution
      DATABASE_CONNECTION_CLIENT_NAME: evolution
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://redis:6379
      CACHE_REDIS_PREFIX_KEY: evo
      CACHE_REDIS_SAVE_INSTANCES: "true"
      CACHE_REDIS_TTL: "604800"
      CACHE_LOCAL_ENABLED: "false"
      WEBHOOK_GLOBAL_ENABLED: "true"
      WEBHOOK_GLOBAL_URL: ${APP_URL}/api/webhook/evolution
      WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS: "false"
      WEBHOOK_EVENTS_MESSAGES_UPSERT: "true"
      WEBHOOK_EVENTS_CONNECTION_UPDATE: "false"
      WEBHOOK_EVENTS_QRCODE_UPDATED: "false"
      LOG_LEVEL: ERROR
      LOG_COLOR: "false"
      LOG_BAILEYS: "error"
      DEL_INSTANCE: "false"
      LANGUAGE: pt-BR
    volumes:
      - evolution_instances:/evolution/instances
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Postgres (exclusivo Evolution) ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: evolution_postgres
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"
    env_file: .env.vps
    environment:
      POSTGRES_USER: evolution
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: evolution
    volumes:
      - evolution_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evolution -d evolution"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── Redis (exclusivo Evolution) ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: evolution_redis
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.25"
    volumes:
      - evolution_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── Worker BullMQ ───────────────────────────────────────────────────────────
  # Consome fila wa-mensagem do Upstash Redis, processa via IA e responde pelo WhatsApp.
  # .env.worker deve conter: DATABASE_URL (Neon), REDIS_URL (Upstash), EVOLUTION_API_URL,
  # EVOLUTION_API_KEY, ANTHROPIC_API_KEY (ou OPENROUTER_API_KEY), AUTH_SECRET, APP_URL.
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: aproxima_worker
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"
    env_file: .env.worker
    depends_on:
      evolution-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "process.exit(0)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  evolution_instances:
  evolution_pg_data:
  evolution_redis_data:
