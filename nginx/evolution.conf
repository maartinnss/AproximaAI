# Nginx reverse proxy para Evolution API na VPS.
# Substituir "evolution.seudominio.com" pelo domínio real.
#
# Setup inicial:
#   1. apt install nginx certbot python3-certbot-nginx
#   2. cp nginx/evolution.conf /etc/nginx/sites-available/evolution
#   3. ln -s /etc/nginx/sites-available/evolution /etc/nginx/sites-enabled/
#   4. nginx -t && systemctl reload nginx
#   5. certbot --nginx -d evolution.seudominio.com

# Rate limit: 10 req/s por IP (burst 20 sem delay).
# WebSocket handshakes contam como 1 req e raramente excedem esse limite.
limit_req_zone $binary_remote_addr zone=evolution:10m rate=10r/s;

server {
    listen 80;
    server_name evolution.seudominio.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name evolution.seudominio.com;

    server_tokens off;

    ssl_certificate     /etc/letsencrypt/live/evolution.seudominio.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/evolution.seudominio.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_stapling on;
    ssl_stapling_verify on;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff"                              always;
    add_header X-Frame-Options           "DENY"                                 always;
    add_header Referrer-Policy           "no-referrer"                          always;

    # Necessário para uploads de mídia WhatsApp e QR codes
    client_max_body_size 50m;

    location / {
        limit_req zone=evolution burst=20 nodelay;

        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;

        # WebSocket (Evolution usa WS para push de QR code e status)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;

        # Timeout longo para conexões WS (QR code streaming e status push)
        proxy_read_timeout    86400;
        proxy_connect_timeout 60;
        proxy_send_timeout    60;
    }
}
